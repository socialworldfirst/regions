<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Regional Status</title>
<style>
  :root {
    --charcoal: #2D2D2D;
    --bg: #F7F7F7;
    --card: #FFFFFF;
    --border: #E8E8E8;
    --text: #1A1A1A;
    --text2: #6B6B6B;
    --text3: #9A9A9A;
    --accent: #E91E63;
    --launching: #DC2626;
    --active: #F59E0B;
    --planning: #3B82F6;
    --quiet: #9CA3AF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.45;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .hdr {
    background: var(--charcoal);
    color: white;
    padding: 14px 16px 10px;
    padding-top: max(14px, env(safe-area-inset-top));
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .hdr h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .hdr .sub {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
  }
  .hdr-stats {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .stat .v {
    font-size: 14px;
    font-weight: 800;
  }
  .stat .l {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
  }

  /* FILTERS */
  .filters {
    background: #fff;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    overflow-x: auto;
    position: sticky;
    top: 60px;
    z-index: 99;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    background: #F0F0F0;
    cursor: pointer;
    border: none;
    transition: all 0.12s;
  }
  .chip.on {
    background: var(--charcoal);
    color: #fff;
  }

  /* GRID */
  .wrap {
    padding: 12px;
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (min-width: 720px) {
    .wrap { grid-template-columns: 1fr 1fr; padding: 16px; gap: 12px; }
  }
  @media (min-width: 1100px) {
    .wrap { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 16px;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card.quiet { opacity: 0.62; }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 8px;
  }
  .card-region {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .pill {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #fff;
  }
  .pill.launching { background: var(--launching); }
  .pill.active { background: var(--active); }
  .pill.planning { background: var(--planning); }
  .pill.quiet { background: var(--quiet); }

  .meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
    font-size: 11px;
    margin: 6px 0 10px;
    color: var(--text2);
  }
  .meta .k { color: var(--text3); font-weight: 600; text-transform: uppercase; font-size: 9px; letter-spacing: 0.4px; align-self: center; }
  .meta .v { color: var(--text); font-weight: 500; }

  .section {
    margin-top: 10px;
  }
  .section-title {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .section p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .section ul {
    list-style: none;
    padding: 0;
  }
  .section ul li {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.5;
    padding-left: 12px;
    position: relative;
    margin-bottom: 3px;
  }
  .section ul li::before {
    content: '·';
    position: absolute;
    left: 2px;
    color: var(--accent);
    font-weight: 800;
  }

  .footer {
    text-align: center;
    padding: 24px 12px 32px;
    color: var(--text3);
    font-size: 10px;
  }
  .footer a {
    color: var(--text3);
    text-decoration: none;
    border-bottom: 1px dotted var(--text3);
  }
</style>
</head>
<body>
<div class="hdr">
  <h1>Regional Status</h1>
  <div class="sub">WF central KOL/marketing pipelines · per-region snapshot</div>
  <div class="hdr-stats">
    <div class="stat"><span class="v" id="stat-active">0</span><span class="l">Active</span></div>
    <div class="stat"><span class="v" id="stat-launching">0</span><span class="l">Launching</span></div>
    <div class="stat"><span class="v" id="stat-quiet">0</span><span class="l">Quiet</span></div>
    <div class="stat"><span class="v" id="stat-updated">—</span><span class="l">Updated</span></div>
  </div>
</div>

<div class="filters" id="filters">
  <button class="chip on" data-f="all">All</button>
  <button class="chip" data-f="launching">Launching</button>
  <button class="chip" data-f="active">Active</button>
  <button class="chip" data-f="planning">Planning</button>
  <button class="chip" data-f="quiet">Quiet</button>
</div>

<div class="wrap" id="wrap"></div>

<div class="footer">
  Source: <a href="https://github.com/socialworldfirst/regions" target="_blank">socialworldfirst/regions</a> · regen with <code>/regions</code>
</div>

<script>
const DATA = {
  "updated": "2026-05-07T12:18:52",
  "regions": [
    {
      "name": "Vietnam",
      "situation": "Vietnam launching the Freelancer segment end of May, first time WF treats freelancers as a distinct audience. Big bet on the \"hire freelancers as micro-influencers\" playbook (job-offer framing, fixed fee + affiliate link, real users showing $$ comparisons vs PayPal/Pioneer/PingPong). Two-track model: big TikTok KOLs ($500–$1.5K, ~$6 CPM) plus micro-influencer freelancers ($50–$500). Clean competitive lane: PingPong is deprioritizing this segment, Pioneer charges withdrawal fee + 2% to local banks. Plan: test small in June, scale July if it works.",
      "asks": [
        "Send Thao the PR number for the content creation budget she requested",
        "Decide Q2 KOL budget allocation now that I own the central pool"
      ],
      "next": "2026-05-07: Thao's local agency briefing call · After agency call: Thao sends final budget number, then I allocate",
      "benchmarkList": [
        "CPM ~$6 (very efficient by global standards)",
        "One developer KOL: 2M views for under $1K",
        "Influencer fee range: $500–$1,500",
        "E-commerce KOL stopped working in 2026, freelancer/developer KOL works"
      ],
      "lead": "Thao",
      "status": "launching",
      "statusLabel": "Launching",
      "initiative": "Freelancer GTM (end of May 2026)",
      "budget": "~$60K Q2 (split ~$30K content / ~$30K KOL+boosting) · NFC: Freelancer = 40-50% of VN's 5,700 NFC for the year",
      "lastTouch": "2026-05-06 (1hr kickoff call)"
    },
    {
      "name": "Philippines",
      "situation": "Joshua is already working on freelancer launch in Philippines per Thao mention on 5/6 call. No direct sync yet to confirm scope, timing, or budget.",
      "asks": [
        "Sync with Joshua on freelancer launch plan and timing",
        "Compare notes between PH and VN freelancer playbooks for cross-region learning"
      ],
      "next": "Schedule a Joshua sync",
      "lead": "Joshua",
      "status": "active",
      "statusLabel": "Active (per Thao call, no direct sync yet)",
      "initiative": "Freelancer launch (in progress)",
      "budget": "",
      "lastTouch": ""
    },
    {
      "name": "United Kingdom",
      "situation": "No active KOL initiative tracked. Update when there's news.",
      "lead": "TBD",
      "status": "quiet",
      "statusLabel": "Quiet",
      "initiative": "",
      "budget": "",
      "lastTouch": "—"
    },
    {
      "name": "United States",
      "situation": "No active KOL initiative tracked. Update when there's news.",
      "lead": "TBD",
      "status": "quiet",
      "statusLabel": "Quiet",
      "initiative": "",
      "budget": "",
      "lastTouch": "—"
    },
    {
      "name": "EU",
      "situation": "No active KOL initiative tracked. Update when there's news.",
      "lead": "TBD",
      "status": "quiet",
      "statusLabel": "Quiet",
      "initiative": "",
      "budget": "",
      "lastTouch": "—"
    },
    {
      "name": "Korea",
      "situation": "KR Post is the active Meta Ads account (per memory). No KOL pipeline tracked yet.",
      "lead": "TBD (KR Post is the active Meta Ads account)",
      "status": "quiet",
      "statusLabel": "Quiet on KOL",
      "initiative": "",
      "budget": "",
      "lastTouch": "—"
    },
    {
      "name": "Japan",
      "situation": "No active KOL initiative tracked. Update when there's news.",
      "lead": "TBD",
      "status": "quiet",
      "statusLabel": "Quiet",
      "initiative": "",
      "budget": "",
      "lastTouch": "—"
    },
    {
      "name": "Australia",
      "situation": "No active KOL initiative tracked. Update when there's news.",
      "lead": "TBD",
      "status": "quiet",
      "statusLabel": "Quiet",
      "initiative": "",
      "budget": "",
      "lastTouch": "—"
    },
    {
      "name": "SEA (other)",
      "situation": "Catch-all for SEA markets outside Vietnam and Philippines. No active KOL initiative tracked.",
      "lead": "TBD",
      "status": "quiet",
      "statusLabel": "Quiet",
      "initiative": "",
      "budget": "",
      "lastTouch": "—"
    }
  ]
};

function render() {
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = '';

  const counts = { launching: 0, active: 0, planning: 0, quiet: 0 };

  DATA.regions.forEach(r => {
    const status = (r.status || 'quiet').toLowerCase();
    counts[status] = (counts[status] || 0) + 1;

    const card = document.createElement('div');
    card.className = 'card ' + (status === 'quiet' ? 'quiet' : '');
    card.dataset.status = status;

    let metaHtml = '';
    if (r.lead) metaHtml += '<span class="k">Lead</span><span class="v">' + r.lead + '</span>';
    if (r.initiative) metaHtml += '<span class="k">Focus</span><span class="v">' + r.initiative + '</span>';
    if (r.budget) metaHtml += '<span class="k">Budget</span><span class="v">' + r.budget + '</span>';
    if (r.lastTouch) metaHtml += '<span class="k">Last</span><span class="v">' + r.lastTouch + '</span>';

    let body = '';
    if (r.situation) {
      body += '<div class="section"><div class="section-title">Situation</div><p>' + r.situation + '</p></div>';
    }
    if (r.asks && r.asks.length) {
      body += '<div class="section"><div class="section-title">Open asks (mine)</div><ul>' +
        r.asks.map(a => '<li>' + a + '</li>').join('') + '</ul></div>';
    }
    if (r.next) {
      body += '<div class="section"><div class="section-title">Next</div><p>' + r.next + '</p></div>';
    }
    if (r.benchmarkList && r.benchmarkList.length) {
      body += '<div class="section"><div class="section-title">Benchmarks</div><ul>' +
        r.benchmarkList.map(b => '<li>' + b + '</li>').join('') + '</ul></div>';
    } else if (r.benchmarks) {
      body += '<div class="section"><div class="section-title">Benchmarks</div><p>' + r.benchmarks + '</p></div>';
    }

    card.innerHTML =
      '<div class="card-head">' +
        '<div class="card-region">' + r.name + '</div>' +
        '<span class="pill ' + status + '">' + status + '</span>' +
      '</div>' +
      '<div class="meta">' + metaHtml + '</div>' +
      body;

    wrap.appendChild(card);
  });

  document.getElementById('stat-active').textContent = counts.active || 0;
  document.getElementById('stat-launching').textContent = counts.launching || 0;
  document.getElementById('stat-quiet').textContent = counts.quiet || 0;

  if (DATA.updated) {
    const d = new Date(DATA.updated);
    document.getElementById('stat-updated').textContent =
      String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
  }
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.chip')) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  e.target.classList.add('on');
  const f = e.target.dataset.f;
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = (f === 'all' || c.dataset.status === f) ? '' : 'none';
  });
});

render();
</script>
</body>
</html>
