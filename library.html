<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Library</title>
<style>
  :root {
    --charcoal: #2D2D2D;
    --bg: #F7F7F7;
    --card: #FFFFFF;
    --border: #E8E8E8;
    --border2: #F0F0F0;
    --text: #1A1A1A;
    --text2: #6B6B6B;
    --text3: #9A9A9A;
    --accent: #E91E63;
    --launching: #DC2626;
    --active: #F59E0B;
    --planning: #3B82F6;
    --quiet: #9CA3AF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* APP LAYOUT */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 50; width: 100%; }
  }

  /* SIDEBAR */
  .sidebar {
    background: #fff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .sidebar-head {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--charcoal);
    color: #fff;
  }
  .sidebar-head h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .sidebar-head .sub { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .sidebar-head .links { margin-top: 10px; display: flex; gap: 10px; }
  .sidebar-head .links a { color: rgba(255,255,255,0.7); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .sidebar-search {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border2);
  }
  .sidebar-search input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .sidebar-search input:focus { border-color: var(--charcoal); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
    gap: 6px;
  }
  .nav-item:hover { background: #F5F5F5; }
  .nav-item.active { background: rgba(233, 30, 99, 0.07); border-left-color: var(--accent); }
  .nav-item.active:hover { background: rgba(233, 30, 99, 0.11); }
  .nav-item.active .name { color: var(--accent); font-weight: 700; }
  .nav-item .name { font-size: 13px; font-weight: 600; }
  .nav-item.quiet .name { color: var(--text2); font-weight: 500; }
  .nav-item.active.quiet .name { color: var(--accent); font-weight: 700; }
  .pill {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 8px;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #fff;
  }
  .pill.launching { background: var(--launching); }
  .pill.active { background: var(--active); }
  .pill.planning { background: var(--planning); }
  .pill.quiet { background: var(--quiet); }

  /* MAIN */
  .main { padding: 28px 36px 60px; max-width: 980px; }
  @media (max-width: 720px) { .main { padding: 18px; } }
  .region-head { padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .region-head h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .region-head .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text2);
  }
  .region-head .meta-row .k { color: var(--text3); text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px; font-weight: 600; margin-right: 4px; }

  .section { margin-bottom: 28px; }
  .section-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border2); }
  .section p { font-size: 14px; line-height: 1.65; color: var(--text); margin-bottom: 8px; }
  .section ul { list-style: none; padding-left: 0; margin: 0; }
  .section ul li { font-size: 13px; line-height: 1.55; padding-left: 14px; position: relative; margin-bottom: 5px; }
  .section ul li::before { content: '·'; position: absolute; left: 2px; color: var(--accent); font-weight: 800; }

  .kv-grid {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 16px;
    font-size: 13px;
  }
  .kv-grid .k { color: var(--text3); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px; align-self: center; }
  .kv-grid .v { color: var(--text); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 720px) { .grid3 { grid-template-columns: 1fr; } }

  .mini-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .mini-card .title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .mini-card .sub { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
  .mini-card .body { font-size: 12.5px; line-height: 1.55; color: var(--text); }
  .mini-card dl { font-size: 12px; }
  .mini-card dt { color: var(--text3); text-transform: uppercase; font-size: 9px; letter-spacing: 0.4px; font-weight: 600; margin-top: 6px; }
  .mini-card dd { font-size: 12.5px; color: var(--text); margin-top: 1px; }

  table.data { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.data th, table.data td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border2); }
  table.data th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text3); font-weight: 700; background: var(--bg); }
  table.data td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.data tr.wf { background: rgba(233, 30, 99, 0.06); font-weight: 600; }

  .bar-row { display: grid; grid-template-columns: 130px 1fr 60px; align-items: center; gap: 10px; font-size: 12px; margin-bottom: 4px; }
  .bar-row .label { color: var(--text); font-weight: 500; }
  .bar-row .label.wf { color: var(--accent); font-weight: 700; }
  .bar-row .bar { background: var(--border2); height: 14px; border-radius: 4px; overflow: hidden; }
  .bar-row .fill { background: var(--charcoal); height: 100%; transition: width 0.2s; }
  .bar-row .fill.wf { background: var(--accent); }
  .bar-row .val { text-align: right; color: var(--text2); font-variant-numeric: tabular-nums; font-size: 11.5px; }

  .source { padding: 10px 12px; background: #fff; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text2); margin-top: 6px; }
  .source code { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--text); background: var(--border2); padding: 1px 5px; border-radius: 3px; }

  .empty { padding: 60px 20px; text-align: center; color: var(--text3); font-size: 14px; }

  /* GATE */
  .gate { position: fixed; inset: 0; background: var(--charcoal); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
  .gate-card { background: #fff; border-radius: 14px; padding: 28px 24px 22px; width: 100%; max-width: 320px; text-align: center; }
  .gate-card h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 4px; }
  .gate-card p { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
  .gate-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
  .gate-input:focus { border-color: var(--charcoal); }
  .gate-err { color: var(--launching); font-size: 11px; margin-top: 8px; min-height: 14px; }
  .gated .app { display: none; }
</style>
</head>
<body class="gated">

<div class="gate" id="gate">
  <div class="gate-card">
    <h2>Regional Library</h2>
    <p>Enter password to view</p>
    <input type="password" class="gate-input" id="gate-input" autocomplete="off" autofocus placeholder="password">
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <h1>Regional Library</h1>
      <div class="sub">WF KOL/marketing context, per region</div>
      <div class="links">
        <a href="./">← Dashboard</a>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Filter regions…" autocomplete="off">
    </div>
    <div class="sidebar-list" id="nav"></div>
  </aside>
  <main class="main" id="main">
    <div class="empty">Loading…</div>
  </main>
</div>

<script>
// === Gate (client-side only) ===
(function gate() {
  const PW = 'wf';
  const KEY = 'regions-gate-v2';
  const gateEl = document.getElementById('gate');
  const input = document.getElementById('gate-input');
  const err = document.getElementById('gate-err');
  function unlock() {
    gateEl.style.display = 'none';
    document.body.classList.remove('gated');
    sessionStorage.setItem(KEY, '1');
    init();
  }
  if (sessionStorage.getItem(KEY) === '1') { unlock(); return; }
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (input.value === PW) unlock();
      else { err.textContent = 'Nope'; input.value = ''; }
    }
  });
})();

let REGIONS = [];
let ACTIVE = null;

async function init() {
  try {
    const index = await fetch('data/index.json').then(r => r.json());
    REGIONS = await Promise.all(index.order.map(id =>
      fetch(`data/${id}.json`).then(r => r.json()).catch(() => null)
    ));
    REGIONS = REGIONS.filter(Boolean);
    renderNav();
    const hash = window.location.hash.replace('#', '');
    const first = hash && REGIONS.find(r => r.id === hash) ? hash : REGIONS[0].id;
    selectRegion(first);
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="empty">Failed to load data: ${e.message}</div>`;
  }
}

function statusKey(raw) {
  if (!raw) return 'quiet';
  const f = raw.trim().split(' ')[0].toLowerCase();
  if (f === 'launching' || f === 'launch') return 'launching';
  if (f === 'active' || f === 'live') return 'active';
  if (f === 'planning' || f === 'plan') return 'planning';
  return 'quiet';
}

function renderNav() {
  const nav = document.getElementById('nav');
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  nav.innerHTML = REGIONS
    .filter(r => !q || r.name.toLowerCase().includes(q) || (r.card?.lead || '').toLowerCase().includes(q) || (r.card?.situation || '').toLowerCase().includes(q))
    .map(r => {
      const sk = statusKey(r.card?.status);
      const isActive = r.id === ACTIVE;
      return `
        <div class="nav-item ${sk} ${isActive ? 'active' : ''}" data-id="${r.id}">
          <span class="name">${escapeHtml(r.name)}</span>
          <span class="pill ${sk}">${escapeHtml(r.card?.status || 'Quiet')}</span>
        </div>`;
    }).join('');
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => selectRegion(el.dataset.id));
  });
}

document.getElementById('search').addEventListener('input', renderNav);

function selectRegion(id) {
  ACTIVE = id;
  window.location.hash = id;
  renderNav();
  const r = REGIONS.find(x => x.id === id);
  if (!r) return;
  document.getElementById('main').innerHTML = renderRegion(r);
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0, 0);
}

function renderRegion(r) {
  const c = r.card || {};
  const e = r.extended || {};
  const sk = statusKey(c.status);
  const sections = [];

  // Header
  sections.push(`
    <div class="region-head">
      <h2>${escapeHtml(r.name)} <span class="pill ${sk}" style="vertical-align: middle; margin-left: 8px;">${escapeHtml(c.status || 'Quiet')}</span></h2>
      <div class="meta-row">
        ${c.lead ? `<div><span class="k">Lead</span>${escapeHtml(c.lead)}</div>` : ''}
        ${c.initiative ? `<div><span class="k">Initiative</span>${escapeHtml(c.initiative)}</div>` : ''}
        ${c.budget ? `<div><span class="k">Budget</span>${escapeHtml(c.budget)}</div>` : ''}
        ${c.nfcTarget ? `<div><span class="k">NFC</span>${escapeHtml(c.nfcTarget)}</div>` : ''}
        ${c.lastTouch ? `<div><span class="k">Last touch</span>${escapeHtml(c.lastTouch)}${c.lastTouchNote ? ' (' + escapeHtml(c.lastTouchNote) + ')' : ''}</div>` : ''}
      </div>
    </div>
  `);

  if (c.situation) sections.push(section('Situation', `<p>${escapeHtml(c.situation)}</p>`));
  if ((c.asks || []).length) sections.push(section('Open asks (mine)', renderList(c.asks)));
  if (c.next) {
    const nextHtml = Array.isArray(c.next) ? renderList(c.next) : `<p>${escapeHtml(c.next)}</p>`;
    sections.push(section('Next', nextHtml));
  }
  if ((c.benchmarks || []).length) sections.push(section('Benchmarks', renderList(c.benchmarks)));

  // Extended sections
  if (e.market) sections.push(section('Market', renderKV(e.market)));
  if (e.marketShare2025) sections.push(section('Market Share 2025 YTD (%)', renderShareBars(e.marketShare2025)));
  if ((e.products || []).length) sections.push(section('Hero Products', renderProducts(e.products)));
  if (e.scorecard) sections.push(section('Comprehensive Scorecard (1-5)', renderScorecard(e.scorecard)));
  if (e.audience) sections.push(section('Audience', renderAudience(e.audience)));
  if ((e.regionalPlaybook || []).length) sections.push(section('Regional Playbook (Roots to Routes)', renderRegionalPlaybook(e.regionalPlaybook)));
  if (e.communicationInsights) sections.push(section('Communication Insights', renderKV(e.communicationInsights)));
  if (e.engagementStrategy) sections.push(section(`Engagement Strategy${e.engagementStrategy.name ? ': ' + e.engagementStrategy.name : ''}`, renderPillars(e.engagementStrategy.pillars || [])));
  if (e.influencerAffiliateProgram) sections.push(section('Influencer Affiliate Program', renderKolProgram(e.influencerAffiliateProgram)));
  if (e.paidMediaPlan) sections.push(section('Paid Media Plan', renderPaidMedia(e.paidMediaPlan)));
  if ((e.competitorCommStrategy || []).length) sections.push(section('Competitor Communication Strategy', renderCompetitors(e.competitorCommStrategy)));
  if ((e.mediaReadinessChecklist || []).length) sections.push(section('Media Readiness Checklist', renderMediaReadiness(e.mediaReadinessChecklist)));
  if ((e.mediaPartners || []).length) sections.push(section('TH Media Partners', renderMediaPartners(e.mediaPartners)));

  // Generic extended (catch-all for other regions with extended.* not handled above)
  const handledExtended = new Set(['market','marketShare2025','products','scorecard','audience','regionalPlaybook','communicationInsights','engagementStrategy','influencerAffiliateProgram','paidMediaPlan','competitorCommStrategy','mediaReadinessChecklist','mediaPartners']);
  const otherKeys = Object.keys(e).filter(k => !handledExtended.has(k));
  if (otherKeys.length) {
    const other = {};
    otherKeys.forEach(k => other[k] = e[k]);
    sections.push(section('Additional Context', renderKV(other)));
  }

  if ((r.sources || []).length) {
    sections.push(section('Sources', r.sources.map(s => {
      const parts = [
        s.type ? `<strong>${escapeHtml(s.type)}</strong>` : '',
        s.title ? escapeHtml(s.title) : '',
        s.date ? `(${escapeHtml(s.date)})` : '',
        s.pages ? `${s.pages}pp` : '',
        s.duration_min ? `${s.duration_min} min` : '',
      ].filter(Boolean).join(' · ');
      const path = s.path ? `<br><code>${escapeHtml(s.path)}</code>` : '';
      return `<div class="source">${parts}${path}</div>`;
    }).join('')));
  }

  return sections.join('');
}

function section(title, body) {
  return `<div class="section"><div class="section-h">${escapeHtml(title)}</div>${body}</div>`;
}

function renderList(items) {
  return `<ul>${items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`;
}

function renderKV(obj) {
  const rows = Object.entries(obj).map(([k, v]) => {
    const label = humanize(k);
    let val;
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      val = '<div class="kv-grid">' + Object.entries(v).map(([kk, vv]) =>
        `<div class="k">${escapeHtml(humanize(kk))}</div><div class="v">${formatVal(vv)}</div>`
      ).join('') + '</div>';
    } else {
      val = formatVal(v);
    }
    return `<div class="k">${escapeHtml(label)}</div><div class="v">${val}</div>`;
  }).join('');
  return `<div class="kv-grid">${rows}</div>`;
}

function formatVal(v) {
  if (Array.isArray(v)) return v.map(x => escapeHtml(String(x))).join(' · ');
  if (v && typeof v === 'object') return Object.entries(v).map(([k, vv]) => `<strong>${escapeHtml(humanize(k))}:</strong> ${escapeHtml(String(vv))}`).join('<br>');
  return escapeHtml(String(v));
}

function renderShareBars(shares) {
  const max = Math.max(...Object.values(shares));
  const sorted = Object.entries(shares).sort((a, b) => b[1] - a[1]);
  return sorted.map(([name, val]) => {
    const isWf = name.toLowerCase().includes('worldfirst');
    const w = (val / max) * 100;
    return `
      <div class="bar-row">
        <div class="label ${isWf ? 'wf' : ''}">${escapeHtml(name)}</div>
        <div class="bar"><div class="fill ${isWf ? 'wf' : ''}" style="width:${w}%"></div></div>
        <div class="val">${val}%</div>
      </div>`;
  }).join('');
}

function renderProducts(products) {
  return '<div class="grid3">' + products.map(p => `
    <div class="mini-card">
      <div class="title">${escapeHtml(p.name)}</div>
      ${p.tagline ? `<div class="sub">${escapeHtml(p.tagline)}</div>` : ''}
      ${p.problem ? `<dt>Problem</dt><dd>${escapeHtml(p.problem)}</dd>` : ''}
      ${p.solution ? `<dt>Solution</dt><dd>${escapeHtml(p.solution)}</dd>` : ''}
      ${p.impact ? `<dt>Impact</dt><dd>${escapeHtml(p.impact)}</dd>` : ''}
    </div>`).join('') + '</div>';
}

function renderScorecard(s) {
  const criteria = s.criteria || [];
  const providers = Object.keys(s).filter(k => k !== 'criteria');
  // sort: WorldFirst first, then alpha
  providers.sort((a, b) => {
    if (a === 'WorldFirst') return -1;
    if (b === 'WorldFirst') return 1;
    return a.localeCompare(b);
  });
  return `<div style="overflow-x:auto;"><table class="data">
    <thead><tr><th>Provider</th>${criteria.map(c => `<th class="num">${escapeHtml(c)}</th>`).join('')}<th class="num">Avg</th></tr></thead>
    <tbody>
      ${providers.map(p => {
        const vals = s[p] || [];
        const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '';
        const isWf = p === 'WorldFirst';
        return `<tr class="${isWf ? 'wf' : ''}"><td>${escapeHtml(p)}</td>${vals.map(v => `<td class="num">${v}</td>`).join('')}<td class="num">${avg}</td></tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

function renderAudience(a) {
  const parts = [];
  if (a.totalSMEs) parts.push(`<p><strong>${a.totalSMEs.toLocaleString()}</strong> total SMEs</p>`);
  if (a.breakdown) {
    const rows = Object.entries(a.breakdown).map(([k, v]) => `
      <tr><td>${escapeHtml(k)}</td><td class="num">${v.count?.toLocaleString() || ''}</td><td class="num">${v.pct ? v.pct + '%' : ''}</td><td>${escapeHtml(v.characteristics || '')}</td></tr>
    `).join('');
    parts.push(`<table class="data"><thead><tr><th>Size</th><th class="num">Count</th><th class="num">%</th><th>Characteristics</th></tr></thead><tbody>${rows}</tbody></table>`);
  }
  if (a.industryMix) {
    parts.push(`<p style="margin-top:10px;"><span class="k" style="color:var(--text3); text-transform:uppercase; font-size:10px; letter-spacing:0.4px; font-weight:600;">Industry Mix</span> ` + Object.entries(a.industryMix).map(([k,v]) => `${escapeHtml(k)} ${v}%`).join(' · ') + '</p>');
  }
  if (a.expansionAudience) {
    parts.push(`<div class="mini-card" style="margin-top:12px;"><div class="title">${escapeHtml(a.expansionAudience.label || 'Expansion audience')}</div><div class="body">${escapeHtml(a.expansionAudience.annualSize || '')} · Cross-border interest: ${escapeHtml(a.expansionAudience.crossBorderInterest || '')} · E-com intent: ${escapeHtml(a.expansionAudience.ecomIntent || '')}</div></div>`);
  }
  return parts.join('');
}

function renderRegionalPlaybook(regions) {
  return '<div class="grid2">' + regions.map(r => `
    <div class="mini-card">
      <div class="title">${escapeHtml(r.region)}</div>
      <div class="sub">${escapeHtml(r.provinces || '')}${r.tradeVolumeMillion ? ' · $' + (r.tradeVolumeMillion/1000).toFixed(0) + 'B trade' : ''}</div>
      <dt>Campaign</dt><dd>${escapeHtml(r.campaign || '')}</dd>
      ${r.concept ? `<dt>Concept</dt><dd>${escapeHtml(r.concept)}</dd>` : ''}
      ${r.industries ? `<dt>Industries</dt><dd>${escapeHtml(r.industries)}</dd>` : ''}
      ${(r.activities || []).length ? `<dt>Activities</dt><dd>${r.activities.map(a => escapeHtml(a)).join(' · ')}</dd>` : ''}
    </div>`).join('') + '</div>';
}

function renderPillars(pillars) {
  return '<div class="grid2">' + pillars.map(p => `
    <div class="mini-card">
      <div class="title">${escapeHtml(p.name)}</div>
      <div class="sub">Reach: ${escapeHtml(p.reach || '—')} · Relevance: ${escapeHtml(p.relevance || '—')}</div>
      ${p.audience ? `<dt>Audience</dt><dd>${escapeHtml(p.audience)}</dd>` : ''}
      ${p.channels ? `<dt>Channels</dt><dd>${escapeHtml(p.channels)}</dd>` : ''}
      ${(p.activities || []).length ? `<dt>Activities</dt><dd>${p.activities.map(a => escapeHtml(a)).join(' · ')}</dd>` : ''}
      ${(p.kpis || []).length ? `<dt>KPIs</dt><dd>${p.kpis.map(k => escapeHtml(k)).join(' · ')}</dd>` : ''}
    </div>`).join('') + '</div>';
}

function renderKolProgram(p) {
  const parts = [];
  if ((p.tiers || []).length) {
    parts.push('<div class="grid3">' + p.tiers.map(t => `
      <div class="mini-card">
        <div class="title">Tier ${t.tier} · ${escapeHtml(t.label || '')}</div>
        <div class="sub">${escapeHtml(t.count || '')}</div>
        ${(t.examples || []).length ? `<dt>Examples</dt><dd>${t.examples.map(e => escapeHtml(e)).join(', ')}</dd>` : ''}
      </div>`).join('') + '</div>');
  }
  if (p.rewards) {
    parts.push(`<div style="margin-top:12px;">` + renderKV(p.rewards) + `</div>`);
  }
  if ((p.channels || []).length) parts.push(`<p style="margin-top:10px;"><span class="k" style="color:var(--text3); text-transform:uppercase; font-size:10px; letter-spacing:0.4px; font-weight:600;">Channels</span> ${p.channels.map(c => escapeHtml(c)).join(' · ')}</p>`);
  if ((p.contentTypes || []).length) parts.push(`<p><span class="k" style="color:var(--text3); text-transform:uppercase; font-size:10px; letter-spacing:0.4px; font-weight:600;">Content Types</span> ${p.contentTypes.map(c => escapeHtml(c)).join(' · ')}</p>`);
  if ((p.hashtags || []).length) parts.push(`<p><span class="k" style="color:var(--text3); text-transform:uppercase; font-size:10px; letter-spacing:0.4px; font-weight:600;">Hashtags</span> ${p.hashtags.map(c => escapeHtml(c)).join(' · ')}</p>`);
  if ((p.phases || []).length) parts.push(`<p><span class="k" style="color:var(--text3); text-transform:uppercase; font-size:10px; letter-spacing:0.4px; font-weight:600;">Phases</span> ${p.phases.map(c => escapeHtml(c)).join(' → ')}</p>`);
  return parts.join('');
}

function renderPaidMedia(p) {
  const parts = [];
  if ((p.platforms || []).length) parts.push(`<p><span class="k" style="color:var(--text3); text-transform:uppercase; font-size:10px; letter-spacing:0.4px; font-weight:600;">Platforms</span> ${p.platforms.map(escapeHtml).join(' · ')}</p>`);
  if ((p.productFunnels || []).length) {
    parts.push(`<table class="data" style="margin-top:10px;"><thead><tr><th>Product</th><th>TOFU</th><th>MOFU</th><th>BOFU</th></tr></thead><tbody>` +
      p.productFunnels.map(f => `<tr><td>${escapeHtml(f.product)}</td><td>${escapeHtml(f.tofuReach || '')}</td><td>${escapeHtml(f.mofuReach || '')}</td><td>${escapeHtml(f.bofuReach || '')}</td></tr>`).join('') + `</tbody></table>`);
  }
  if ((p.semAdGroups || []).length) {
    parts.push(`<table class="data" style="margin-top:12px;"><thead><tr><th>Ad Group</th><th>CTA</th><th>Thai Keywords</th></tr></thead><tbody>` +
      p.semAdGroups.map(g => `<tr><td>${escapeHtml(g.group)}</td><td>${escapeHtml(g.ctaFocus || '')}</td><td>${escapeHtml(g.thaiKeywords || '')}</td></tr>`).join('') + `</tbody></table>`);
  }
  return parts.join('');
}

function renderCompetitors(comps) {
  return `<div style="overflow-x:auto;"><table class="data">
    <thead><tr><th>Competitor</th><th class="num">Annual Spend</th><th>Strategy</th><th>Value Prop</th><th>Media</th></tr></thead>
    <tbody>${comps.map(c => `<tr>
      <td><strong>${escapeHtml(c.name)}</strong></td>
      <td class="num">${escapeHtml(c.annualSpendTHB || '')}</td>
      <td>${escapeHtml(c.strategy || '')}</td>
      <td>${escapeHtml(c.valueProp || '')}</td>
      <td>${escapeHtml(c.media || '')}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderMediaReadiness(rows) {
  return `<div style="overflow-x:auto;"><table class="data">
    <thead><tr><th>Provider</th><th>Website</th><th>Blog</th><th>TH Social</th><th>Content Strategy</th></tr></thead>
    <tbody>${rows.map(r => {
      const isWf = r.provider === 'WorldFirst';
      return `<tr class="${isWf ? 'wf' : ''}">
        <td>${escapeHtml(r.provider)}</td>
        <td>${escapeHtml(r.website || '')}</td>
        <td>${escapeHtml(r.blog || '')}</td>
        <td>${escapeHtml(r.socialTH || '')}</td>
        <td>${escapeHtml(r.contentStrategy || '')}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function renderMediaPartners(partners) {
  return `<div style="overflow-x:auto;"><table class="data">
    <thead><tr><th>Partner</th><th>Category</th><th class="num">FB</th><th class="num">FB ER</th><th class="num">YT</th><th class="num">YT ER</th><th class="num">IG</th></tr></thead>
    <tbody>${partners.map(p => `<tr>
      <td><strong>${escapeHtml(p.name)}</strong></td>
      <td>${escapeHtml(p.category || '')}</td>
      <td class="num">${p.fb ? fmtNum(p.fb) : ''}</td>
      <td class="num">${p.fbEngagement ? p.fbEngagement + '%' : ''}</td>
      <td class="num">${p.yt ? fmtNum(p.yt) : ''}</td>
      <td class="num">${p.ytEngagement ? p.ytEngagement + '%' : ''}</td>
      <td class="num">${p.ig ? fmtNum(p.ig) : ''}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

function humanize(k) {
  return k.replace(/([A-Z])/g, ' $1').replace(/_/g, ' ').replace(/^./, s => s.toUpperCase()).trim();
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
